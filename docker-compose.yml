version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: parknet-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: parqueadero

  backend:
    build: ./backend
    container_name: parknet-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/parqueadero
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: production
      LOG_LEVEL: info
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: parknet-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
